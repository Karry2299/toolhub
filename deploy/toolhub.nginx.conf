# ToolHub Nginx 配置
# 使用方式: 
#   sudo ln -s /var/www/toolhub/deploy/toolhub.nginx.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/toolhub.nginx.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;  # 改成你的域名
    client_max_body_size 50M;

    # 后端 API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态文件
    location /static/ {
        alias /var/www/toolhub/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 用户上传文件
    location /media/ {
        alias /var/www/toolhub/media/;
        expires 7d;
    }

    # 前端 SPA + 健康检查
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}