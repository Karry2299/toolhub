<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="92" fill="url(#bg)" stroke="url(#gold)" stroke-width="2.5"/>

  <!-- Wrench icon (simplified) -->
  <g transform="translate(58, 48)" fill="none" stroke="url(#gold)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Wrench head -->
    <path d="M8 28 L28 8 Q38 -2 48 8 L38 18 L48 28 Q58 38 48 48 L28 28 L8 48 Q-2 38 8 28Z"/>
    <!-- Wrench handle -->
    <line x1="28" y1="28" x2="68" y2="68"/>
    <line x1="58" y1="58" x2="72" y2="72"/>
  </g>

  <!-- ToolHub text -->
  <text x="100" y="142" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="3">ToolHub</text>

  <!-- Small decorative dots -->
  <circle cx="40" cy="160" r="2.5" fill="#f59e0b" opacity="0.6"/>
  <circle cx="160" cy="160" r="2.5" fill="#f59e0b" opacity="0.6"/>
</svg>